<div class="container">
  <h1>{{ id() ? 'Modificar préstamo' : 'Nuevo préstamo' }}</h1>

  <form #loanForm="ngForm">
    <mat-form-field appearance="outline">
      <mat-label>Identificador</mat-label>
      <input matInput [value]="id() ?? ''" disabled>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Cliente *</mat-label>
      <mat-select [(ngModel)]="selectedClient" name="client" required [compareWith]="compareObjects">
        <mat-option *ngFor="let c of clients" [value]="c">{{ c.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Juego *</mat-label>
      <mat-select [(ngModel)]="selectedGame" name="game" required [compareWith]="compareObjects">
        <mat-option *ngFor="let g of games" [value]="g">{{ g.title }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Rango de fechas *</mat-label>
      <mat-date-range-input [rangePicker]="rangePicker">
        <input matStartDate [(ngModel)]="startDate" name="start" required placeholder="Inicio">
        <input matEndDate [(ngModel)]="endDate" name="end" required placeholder="Fin">
      </mat-date-range-input>
      <mat-datepicker-toggle matIconSuffix [for]="rangePicker"></mat-datepicker-toggle>
      <mat-date-range-picker #rangePicker></mat-date-range-picker>
    </mat-form-field>

    @if (errorMessage()) {
      <div class="alert-error-msg">{{ errorMessage() }}</div>
    }
  </form>

  <div class="buttons">
    <button mat-stroked-button (click)="onClose()">Cerrar</button>
    <button mat-flat-button color="primary" (click)="onSave()" [disabled]="loanForm.invalid">Guardar</button>
  </div>
</div>

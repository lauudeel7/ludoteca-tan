<div class="backdrop" (click)="onClose()">

  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>{{ id() ? 'Editar juego' : 'Crear juego' }}</h2>
    </div>

    <div class="modal-body">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>ID</mat-label>
        <input matInput type="text" [value]="id() ?? ''" placeholder="Identificador" readonly />
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Título</mat-label>
        <input matInput type="text" [(ngModel)]="title" required />
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Edad</mat-label>
        <input matInput type="number" [(ngModel)]="age" min="0" max="99" required />
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Categoría</mat-label>
        <mat-select [(ngModel)]="categoryId" required>
          <mat-option [value]="null">Seleccione categoría</mat-option>
          @for (c of categories(); track c.id) {
            <mat-option [value]="c.id">{{ c.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Autor</mat-label>
        <mat-select [(ngModel)]="authorId" required>
          <mat-option [value]="null">Seleccione autor</mat-option>
          @for (a of authors(); track a.id) {
            <mat-option [value]="a.id">{{ a.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="modal-footer">
      <button mat-button (click)="onClose()">
        Cancelar
      </button>
      <button mat-raised-button color="primary" (click)="onSave()" [disabled]="!isValid()">
        Guardar
      </button>
    </div>

  </div>

</div>

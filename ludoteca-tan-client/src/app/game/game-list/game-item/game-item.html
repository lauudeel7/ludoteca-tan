<div class="container" (click)="onCardClick()">
  <mat-card>
    <div class="photo">

      <img src="assets/game-placeholder.png" alt="Foto del juego">
    </div>
    <div class="detail">
      <div class="title">{{ game().title }}</div>
      <div class="properties">
        <div><i>Edad recomendada: </i>+{{ game().age }}</div>
        <div><i>Categoría: </i>{{ game().categoryName }}</div>
        <div><i>Autor: </i>{{ game().authorName }}</div>
        <div><i>Nacionalidad: </i>{{ game().authorNationality }}</div>
      </div>
    </div>
  </mat-card>
</div>

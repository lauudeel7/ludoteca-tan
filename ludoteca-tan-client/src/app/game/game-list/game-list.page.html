<div class="container">
  <div class="header-section">
    <h1>Catálogo de Juegos</h1>
    <div class="title-underline"></div>
  </div>

  <div class="toolbar">
    <div class="filters">
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Nombre del juego</mat-label>
        <input matInput type="text" [(ngModel)]="filterTitle" placeholder="Ej. Carcassonne" />
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Categoría</mat-label>
        <mat-select [(ngModel)]="filterCategory">
          <mat-option [value]="null">Todas las categorías</mat-option>
          @for (category of categories(); track category.id) {
        <mat-option [value]="category">{{ category.name }}</mat-option>
      }
        </mat-select>
      </mat-form-field>

      <div class="actions">
        <button mat-flat-button color="primary" (click)="onSearch()">Filtrar</button>
        <button mat-stroked-button (click)="onCleanFilter()">Limpiar</button>
      </div>
    </div>

    <button mat-raised-button color="primary" (click)="createGame()">
      + Nuevo juego
    </button>
  </div>

  <div class="game-container">
    @for (gameItem of games(); track gameItem.id) {
    <app-game-item [game]="gameItem" (click)="editGame(gameItem)"></app-game-item>
  }
  </div>
</div>
